<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Biodex — Soft Grid Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Manrope', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="catalog-shared.jsx"></script>
<script type="text/babel" src="catalog-a.jsx"></script>
<script type="text/babel" src="evolution.jsx"></script>
<script type="text/babel" src="detail-spec.jsx"></script>
<script type="text/babel" src="compare.jsx"></script>
<script type="text/babel" src="team.jsx"></script>
<script type="text/babel" src="app-softgrid.jsx"></script>
<script type="text/babel">
  const W = 1280, H = 820;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="intro" title="Biodex — Soft Grid direction"
          subtitle="Chosen direction, now paired with Spec Sheet detail + evolution tree, full compare view, and team builder. Everything on the same canvas.">
          <DCArtboard id="notes" label="Design notes" width={480} height={H}>
            <div style={{ padding: '28px 32px', height: '100%', overflow: 'auto', fontFamily: 'Manrope, system-ui, sans-serif', color: '#1a1410', background: '#fff' }}>
              <div style={{ fontSize: 10, fontFamily: 'ui-monospace, monospace', color: '#8a8278', letterSpacing: 1.2 }}>BIODEX · V0.2</div>
              <h1 style={{ margin: '6px 0 14px', fontSize: 28, fontWeight: 800, letterSpacing: -1, lineHeight: 1.05 }}>Soft Grid, now with<br/>detail + compare + team.</h1>
              <p style={{ fontSize: 13, lineHeight: 1.55, color: '#3a3530' }}>
                The first artboard ("Soft Grid — full flow") is a live prototype. Click a creature to open the detail page (Spec Sheet treatment, with evolution tree), drag cards into the bottom tray to Compare, or hit Team Builder in the top bar.
              </p>

              <h3 style={{ fontSize: 11, letterSpacing: 1.2, textTransform: 'uppercase', color: '#8a8278', fontWeight: 700, marginTop: 22, marginBottom: 8 }}>What's new</h3>
              <ul style={{ fontSize: 12, lineHeight: 1.7, color: '#3a3530', paddingLeft: 18, margin: 0 }}>
                <li><strong>Detail → Spec Sheet</strong> treatment with animated radar chart + horizontal stat bars.</li>
                <li><strong>Evolution tree</strong> in the detail — click any stage to pivot the page to that creature.</li>
                <li><strong>Full Compare view</strong> (no longer a modal) — overlay radar, per-stat highlights for the max, remove/add slots.</li>
                <li><strong>Team Builder</strong> — 6 slots, roster picker, live type coverage, role mix, team BST average.</li>
              </ul>

              <h3 style={{ fontSize: 11, letterSpacing: 1.2, textTransform: 'uppercase', color: '#8a8278', fontWeight: 700, marginTop: 22, marginBottom: 8 }}>Also on this canvas</h3>
              <ul style={{ fontSize: 12, lineHeight: 1.6, color: '#3a3530', paddingLeft: 18, margin: 0 }}>
                <li>Isolated screens for Detail, Compare, and Team Builder so you can review each without navigating.</li>
                <li>Each artboard is independent — drag them around, focus any one fullscreen with the ⤢ icon.</li>
              </ul>

              <h3 style={{ fontSize: 11, letterSpacing: 1.2, textTransform: 'uppercase', color: '#8a8278', fontWeight: 700, marginTop: 22, marginBottom: 8 }}>Still open</h3>
              <ul style={{ fontSize: 12, lineHeight: 1.6, color: '#3a3530', paddingLeft: 18, margin: 0 }}>
                <li>Moves / abilities section on detail — not built yet.</li>
                <li>Type-matchup chart — not built yet.</li>
                <li>Command-K global search — not built yet.</li>
              </ul>
            </div>
          </DCArtboard>

          <DCArtboard id="full" label="Soft Grid — full flow (try clicking / dragging / Team Builder)" width={W} height={H}>
            <SoftGridApp />
          </DCArtboard>
        </DCSection>

        <DCSection id="screens" title="Individual screens"
          subtitle="Each screen in isolation for review.">
          <DCArtboard id="detail-screen" label="Detail · Spec Sheet + Evolution Tree" width={W} height={H}>
            <DetailSpec c={CREATURES[13]} onBack={() => {}} onSelect={() => {}} />
          </DCArtboard>
          <DCArtboard id="compare-screen" label="Compare · full-page view" width={W} height={H}>
            <CompareView initial={[CREATURES[9], CREATURES[13], CREATURES[19]]} onBack={() => {}} onAdd={() => {}} />
          </DCArtboard>
          <DCArtboard id="team-screen" label="Team Builder" width={W} height={H}>
            <TeamBuilder initial={[CREATURES[9], CREATURES[20], CREATURES[17]]} onBack={() => {}} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
